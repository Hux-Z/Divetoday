    <path d="M825 518c78-6 151 31 176 89 17 40-9 80-63 93-65 15-164-7-210-50-39-36-18-125 97-132z"/>
    <path d="M329 353c73 11 128 74 122 153-6 93-73 178-153 193-64 12-116-24-129-93-17-94 29-216 101-249 17-8 37-8 59-4z"/>
    <path d="M386 184c45 0 79 32 83 78 4 49-27 97-75 116-43 17-89 6-112-29-26-41-16-103 24-139 21-19 48-26 80-26z"/>
    <path d="M464 93c38-1 63 24 59 57-3 28-28 52-58 58-33 7-64-9-75-38-12-32 3-67 34-75 12-3 25-2 40-2z"/>
  </g>

  <g font-family="Arial, sans-serif" fill="#1a2e1f">
