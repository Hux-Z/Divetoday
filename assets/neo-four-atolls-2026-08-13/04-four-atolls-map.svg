<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Maldives Four Atolls Route Map</title>
  <desc id="desc">A simple central Maldives four-atolls liveaboard route from Male to South Male, Vaavu, South Ari, North Ari and Rasdhoo, returning to Male.</desc>
  <rect width="1200" height="760" fill="#f5f1e8"/>
  <g opacity=".15" stroke="#1a2e1f" stroke-width="1">
    <path d="M80 110H1120M80 230H1120M80 350H1120M80 470H1120M80 590H1120"/>
    <path d="M180 60V700M360 60V700M540 60V700M720 60V700M900 60V700M1080 60V700"/>
  </g>
  <text x="78" y="86" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#1a2e1f">NEO CRUISER · FOUR ATOLLS ROUTE</text>
  <text x="78" y="122" font-family="Arial, sans-serif" font-size="17" fill="#72806f">Male → South Male → Vaavu → South Ari → North Ari / Rasdhoo → Male</text>

  <g fill="#cddfca" stroke="#1a2e1f" stroke-width="3">
